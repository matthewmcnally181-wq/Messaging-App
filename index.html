<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher - Encrypted Messaging</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f2e;
      --bg-tertiary: #252d3d;
      --text-primary: #e1e8f0;
      --text-secondary: #a0aec0;
      --accent: #00d084;
      --accent-dim: #00a366;
      --border: #3a4556;
      --danger: #ff4757;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Auth Views */
    .auth-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-secondary);
    }

    .auth-box h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #00ff99 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 200ms;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 200ms;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      background: var(--accent-dim);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-secondary:hover {
      background: rgba(0, 208, 132, 0.1);
    }

    .auth-toggle {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    .error-message {
      color: var(--danger);
      font-size: 12px;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(255, 71, 87, 0.1);
      border-radius: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Chat Layout */
    .chat-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lock-icon {
      color: var(--accent);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
    }

    .conversation-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 150ms;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .conversation-item:hover {
      background: var(--bg-tertiary);
    }

    .conversation-item.active {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    .conversation-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #00ff99 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-primary);
      font-weight: 600;
      flex-shrink: 0;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-preview {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-chat-btn {
      margin: 16px;
    }

    .new-chat-btn .btn {
      width: 100%;
    }

    /* Main Chat Area */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header-info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-info p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .chat-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    .status-dot.online {
      background: var(--accent);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 12px;
      word-wrap: break-word;
      font-size: 14px;
    }

    .message.received .message-content {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .message.sent .message-content {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
      align-self: flex-end;
      margin: 0 4px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Input Area */
    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
    }

    .input-wrapper input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 200ms;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .send-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 200ms;
    }

    .send-btn:hover {
      background: var(--accent-dim);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .modal-header h2 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .modal-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .user-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 200ms;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-item:hover {
      border-color: var(--accent);
    }

    .modal-footer {
      display: flex;
      gap: 8px;
    }

    .modal-footer button {
      flex: 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        position: absolute;
        height: 100%;
        z-index: 100;
      }

      .sidebar.show {
        width: 280px;
      }

      .message-content {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Auth View -->
    <div class="auth-container" id="authView">
      <div class="auth-box">
        <h1>Cipher</h1>
        <p>End-to-end encrypted messaging</p>

        <!-- Login Form -->
        <div id="loginForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Your username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Your password">
          </div>
          <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
          <div class="error-message" id="loginError"></div>
          <div class="auth-toggle">
            Don't have an account? 
            <button onclick="toggleAuthForm()">Create one</button>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUsername" placeholder="Choose a username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Choose a password">
          </div>
          <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
          <div class="error-message" id="regError"></div>
          <div class="auth-toggle">
            Already have an account? 
            <button onclick="toggleAuthForm()">Sign in</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat View -->
    <div class="chat-container" id="chatView" style="display: none;">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">
            <span class="lock-icon">🔒</span>
            <span>Cipher</span>
          </div>
        </div>
        <div class="new-chat-btn">
          <button class="btn btn-secondary" onclick="openNewChatModal()">+ New Chat</button>
        </div>
        <div class="sidebar-content" id="conversationsList"></div>
      </div>

      <!-- Main Chat Area -->
      <div class="chat-main">
        <div class="chat-header">
          <div class="chat-header-info">
            <h2 id="chatTitle">Select a conversation</h2>
            <p id="chatSubtitle">Messages are end-to-end encrypted</p>
          </div>
          <div class="chat-status" id="chatStatus" style="display: none;">
            <span class="status-dot"></span>
            <span id="statusText">Online</span>
          </div>
        </div>

        <div class="chat-messages" id="messagesContainer">
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <div>Select a conversation to start messaging</div>
          </div>
        </div>

        <div class="chat-input-area" id="inputArea" style="display: none;">
          <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- New Chat Modal -->
  <div class="modal" id="newChatModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Start a conversation</h2>
        <p>Select a user to begin encrypted messaging</p>
      </div>
      <div class="modal-body" id="usersList"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeNewChatModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
